preconditioning_start:
  name: Start Preconditioning
  description: >
    Starts a combined preconditioning routine in a single API call:
    AC, defrost, steering wheel heat and seat heat for all four seats.
    Any field set to its "off" default is omitted from the call.
  fields:
    vin:
      name: VIN
      description: Vehicle identification number.
      required: true
      example: "L6TZA1S4XSN095278"
      selector:
        text:
    ac_temp:
      name: AC Target Temperature
      description: Target cabin temperature in °C. Set to 0 to skip AC.
      default: 21
      example: 22
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
    duration_min:
      name: Duration
      description: Duration in minutes for AC, steering wheel and seat heat.
      default: 15
      example: 20
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: "min"
    defrost:
      name: Defrost
      description: Enable front defrost.
      default: false
      selector:
        boolean:
    steering_wheel:
      name: Steering Wheel Heat
      description: Enable steering wheel heating.
      default: false
      selector:
        boolean:
    seat_driver:
      name: Driver Seat Heat
      description: Driver seat heat level (0=off, 1-3).
      default: 0
      selector:
        number:
          min: 0
          max: 3
          step: 1
    seat_passenger:
      name: Passenger Seat Heat
      description: Passenger seat heat level (0=off, 1-3).
      default: 0
      selector:
        number:
          min: 0
          max: 3
          step: 1
    seat_rear_left:
      name: Rear Left Seat Heat
      description: Rear left seat heat level (0=off, 1-3).
      default: 0
      selector:
        number:
          min: 0
          max: 3
          step: 1
    seat_rear_right:
      name: Rear Right Seat Heat
      description: Rear right seat heat level (0=off, 1-3).
      default: 0
      selector:
        number:
          min: 0
          max: 3
          step: 1

schedule_preconditioning:
  name: Schedule Preconditioning (Cloud)
  description: >
    Stores a one-shot preconditioning schedule in the Zeekr cloud (timer 4).
    The car runs the cabin pre-conditioning before the scheduled departure
    time, even if Home Assistant is offline. Replaces any prior cloud plan.
  fields:
    vin:
      name: VIN
      description: Vehicle identification number.
      required: true
      example: "L6TZA1S4XSN095278"
      selector:
        text:
    scheduled_time:
      name: Departure Time
      description: When you want to leave. The car starts climatising before this time.
      required: true
      selector:
        datetime:
    ac:
      name: AC Pre-conditioning
      description: Run AC/heating to reach target cabin temperature.
      default: true
      selector:
        boolean:
    steering_wheel:
      name: Steering Wheel Heating
      description: Pre-heat the steering wheel.
      default: false
      selector:
        boolean:

cancel_scheduled_preconditioning:
  name: Cancel Scheduled Preconditioning (Cloud)
  description: >
    Disables the cloud-side travel plan (timer 4). Has no effect on the local
    Vorklimatisieren-Wochenplan or running preconditioning sessions.
  fields:
    vin:
      name: VIN
      description: Vehicle identification number.
      required: true
      example: "L6TZA1S4XSN095278"
      selector:
        text:
